services:
  postgres:
    image: postgres:16-alpine
    container_name: shoppyfy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: shoppyfy
      POSTGRES_PASSWORD: shoppyfy
      POSTGRES_DB: shoppyfy
    ports:
      # Host port 5433 to avoid clashing with a locally installed PostgreSQL on 5432
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shoppyfy -d shoppyfy"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shoppyfy-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
